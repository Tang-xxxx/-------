<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIFF 3D Height Map Viewer</title>
<style>
:root {
  --bg: #1a1d23;
  --panel-bg: #21252b;
  --border: #333842;
  --text: #c8ccd4;
  --text-secondary: #7f848e;
  --accent: #4d9eff;
  --accent-hover: #3a8bf5;
  --slider-track: #3a3f4b;
  --slider-fill: #4d9eff;
  --danger: #e0556a;
  --success: #5cb878;
  --radius: 8px;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --mono: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
}

/* ── Header ── */
.header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 16px;
  background: var(--panel-bg);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  z-index: 10;
}
.header h1 {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.3px;
  white-space: nowrap;
}
.header h1 span { color: var(--accent); }
.header .file-info {
  font-size: 11px;
  color: var(--text-secondary);
  margin-left: 8px;
  font-family: var(--mono);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.header .spacer { flex: 1; }

/* ── Buttons ── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--panel-bg);
  color: var(--text);
  font-size: 12px;
  font-family: var(--font);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.btn:hover { border-color: var(--accent); color: #fff; }
.btn.accent { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn.accent:hover { background: var(--accent-hover); }
.btn.small { padding: 4px 10px; font-size: 11px; }

/* ── Drop zone ── */
.drop-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(77, 158, 255, 0.12);
  border: 3px dashed var(--accent);
  z-index: 999;
  pointer-events: none;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  color: var(--accent);
  font-weight: 600;
}
.drop-overlay.active { display: flex; }

/* ── Main layout ── */
.main {
  display: flex;
  flex: 1;
  min-height: 0;
  gap: 2px;
  background: var(--border);
}

/* ── Panels ── */
.panel {
  background: var(--panel-bg);
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}
.panel-2d { flex: 1; }
.panel-3d { flex: 1.4; }

.panel-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-secondary);
}
.panel-header .dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--accent);
}

.panel-content {
  flex: 1;
  min-height: 0;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.panel-content canvas {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
}

/* ── Empty state ── */
.empty-state {
  text-align: center;
  color: var(--text-secondary);
  pointer-events: none;
}
.empty-state .icon {
  font-size: 48px;
  margin-bottom: 12px;
  opacity: 0.4;
}
.empty-state p {
  font-size: 13px;
  line-height: 1.6;
}
.empty-state .hint {
  font-size: 11px;
  opacity: 0.6;
  margin-top: 4px;
}

/* ── 3D overlay (min/max badge) ── */
.stats-badge {
  position: absolute;
  top: 10px;
  right: 10px;
  background: rgba(0,0,0,0.7);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 10px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text);
  pointer-events: none;
  backdrop-filter: blur(6px);
  line-height: 1.6;
}
.stats-badge span { color: var(--accent); }

/* ── Control bar ── */
.control-bar {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 10px 16px;
  background: var(--panel-bg);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  flex-wrap: wrap;
  z-index: 10;
}
.control-group {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  color: var(--text-secondary);
}
.control-group label {
  white-space: nowrap;
  font-weight: 500;
  min-width: fit-content;
}

/* ── Sliders ── */
input[type="range"] {
  -webkit-appearance: none;
  appearance: none;
  width: 100px;
  height: 5px;
  border-radius: 3px;
  background: var(--slider-track);
  outline: none;
  cursor: pointer;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--accent);
  border: 2px solid var(--panel-bg);
  cursor: pointer;
  transition: transform 0.1s;
}
input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }

.slider-value {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text);
  min-width: 32px;
  text-align: right;
}

/* ── Select ── */
select {
  padding: 5px 8px;
  border: 1px solid var(--border);
  border-radius: 5px;
  background: var(--bg);
  color: var(--text);
  font-size: 11px;
  font-family: var(--font);
  cursor: pointer;
  outline: none;
}
select:focus { border-color: var(--accent); }

/* ── Checkbox / Toggle ── */
.toggle-label {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--text);
  cursor: pointer;
  white-space: nowrap;
}
.toggle-label input[type="checkbox"] {
  appearance: none;
  -webkit-appearance: none;
  width: 16px; height: 16px;
  border: 1.5px solid var(--border);
  border-radius: 4px;
  background: var(--bg);
  cursor: pointer;
  position: relative;
  flex-shrink: 0;
}
.toggle-label input[type="checkbox"]:checked {
  background: var(--accent);
  border-color: var(--accent);
}
.toggle-label input[type="checkbox"]:checked::after {
  content: '✓';
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  color: #fff;
  font-weight: bold;
}

/* ── Divider ── */
.control-divider {
  width: 1px; height: 20px;
  background: var(--border);
  flex-shrink: 0;
}

/* ── Loading spinner ── */
.spinner {
  display: none;
  width: 32px; height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin: 8px auto;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── File input hidden ── */
#fileInput { display: none; }

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: #2d323b;
  color: var(--text);
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 13px;
  border: 1px solid var(--border);
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  z-index: 1000;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
.toast.show { opacity: 1; }

/* ── Responsive stacking ── */
@media (max-width: 900px) {
  .main { flex-direction: column; }
  .panel-2d { flex: 1; max-height: 45%; }
  .panel-3d { flex: 1.2; }
  .control-bar { gap: 10px; padding: 8px 12px; }
  .header h1 { font-size: 13px; }
}
</style>
</head>
<body>

<!-- Drop overlay -->
<div class="drop-overlay" id="dropOverlay">📥 拖放 TIFF 文件到此处</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Header -->
<div class="header">
  <h1>🏔️ TIFF <span>3D Height Map</span> Viewer</h1>
  <span class="file-info" id="fileInfo">未加载文件</span>
  <span class="spacer"></span>
  <button class="btn accent" id="btnOpen">📂 打开 TIFF</button>
  <button class="btn small" id="btnReset" disabled>🔄 重置视角</button>
  <button class="btn small" id="btnTopView" disabled>📐 俯视</button>
  <button class="btn small" id="btnScreenshot" disabled>📸 截图</button>
</div>
<input type="file" id="fileInput" accept=".tif,.tiff,.TIF,.TIFF">

<!-- Main content -->
<div class="main">
  <!-- 2D Panel -->
  <div class="panel panel-2d" id="panel2d">
    <div class="panel-header"><span class="dot"></span> 2D 原图预览</div>
    <div class="panel-content" id="panel2dContent">
      <div class="empty-state" id="empty2d">
        <div class="icon">🖼️</div>
        <p>拖放 TIFF 文件或点击"打开 TIFF"</p>
        <p class="hint">支持 8-bit / 16-bit 灰度 & RGB TIFF</p>
      </div>
    </div>
  </div>

  <!-- 3D Panel -->
  <div class="panel panel-3d" id="panel3d">
    <div class="panel-header"><span class="dot" style="background:#5cb878"></span> 3D 高度图 — WebGL GPU 加速</div>
    <div class="panel-content" id="panel3dContent">
      <div class="empty-state" id="empty3d">
        <div class="icon">⛰️</div>
        <p>加载 TIFF 后在此显示 3D 高度图</p>
        <p class="hint">鼠标拖动旋转 · 滚轮缩放 · 右键平移</p>
      </div>
      <div class="stats-badge" id="statsBadge" style="display:none">
        Min: <span id="statMin">—</span><br>
        Max: <span id="statMax">—</span><br>
        Range: <span id="statRange">—</span>
      </div>
    </div>
  </div>
</div>

<!-- Control Bar -->
<div class="control-bar" id="controlBar">
  <div class="control-group">
    <label for="zScale">📏 Z 缩放</label>
    <input type="range" id="zScale" min="0.1" max="5" step="0.05" value="1">
    <span class="slider-value" id="zScaleVal">1.00</span>
  </div>

  <div class="control-divider"></div>

  <div class="control-group">
    <label for="meshRes">🔷 网格精度</label>
    <input type="range" id="meshRes" min="40" max="500" step="10" value="200">
    <span class="slider-value" id="meshResVal">200</span>
  </div>

  <div class="control-divider"></div>

  <div class="control-group">
    <label for="colorMap">🎨 颜色映射</label>
    <select id="colorMap">
      <option value="grayscale">灰度 Grayscale</option>
      <option value="jet" selected>彩虹 Jet</option>
      <option value="turbo">Turbo</option>
      <option value="hot">热力图 Hot</option>
      <option value="viridis">Viridis</option>
      <option value="plasma">Plasma</option>
    </select>
  </div>

  <div class="control-divider"></div>

  <label class="toggle-label">
    <input type="checkbox" id="invertHeight"> 🔃 反转高度
  </label>

  <label class="toggle-label">
    <input type="checkbox" id="autoNormalize" checked> 📐 自动归一化
  </label>

  <label class="toggle-label">
    <input type="checkbox" id="showTexture"> 🖼️ 原图纹理
  </label>

  <label class="toggle-label">
    <input type="checkbox" id="wireframe"> 🔲 线框模式
  </label>
</div>

<!-- ──────────── SCRIPTS ──────────── -->
<!-- geotiff.js (UMD, exposes window.GeoTIFF) -->
<script src="https://cdn.jsdelivr.net/npm/geotiff@2.1.3/dist-browser/geotiff.js">
</script>

<!-- Three.js import map -->
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">

// ══════════════════════════════════════

// ══════════════════════════════════════

const state = {
  // TIFF data
  tiffLoaded: false,
  fileName: '',
  imgWidth: 0,
  imgHeight: 0,
  samplesPerPixel: 1,
  bitsPerSample: 8,
  isRGB: false,

  // Full-resolution height data (Float32Array, imgWidth × imgHeight)

  dataMin: 0,
  dataMax: 65535,

  // 2D canvas
  canvas2d: null,
  ctx2d: null,

  // 3D
  scene: null,

  renderer: null,
  controls: null,
  mesh: null,
  meshGeometry: null,
  meshMaterial: null,
  textureCanvas: null,
  textureMap: null,
  animationId: null,
  needsRender: true,

  // Current mesh dimensions
  meshCols: 0,
  meshRows: 0,
};

// ══════════════════════════════════════
//  Color Maps — input [0,1], output {r,g,b} in [0,1]
// ══════════════════════════════════════
const colorMaps = {
  grayscale(t) {
    return { r: t, g: t, b: t };
  },

  jet(t) {
    // Classic MATLAB jet
    let r, g, b;
    if (t < 0.125) {
      r = 0; g = 0; b = 0.5 + t * 4;
    } else if (t < 0.375) {
      r = 0; g = (t - 0.125) * 4; b = 1;
    } else if (t < 0.625) {
      r = (t - 0.375) * 4; g = 1; b = 1 - (t - 0.375) * 4;
    } else if (t < 0.875) {
      r = 1; g = 1 - (t - 0.625) * 4; b = 0;
    } else {
      r = 1 - (t - 0.875) * 4; g = 0; b = 0;
    }
    return { r: Math.max(0, Math.min(1, r)), g: Math.max(0, Math.min(1, g)), b: Math.max(0, Math.min(1, b)) };
  },

  turbo(t) {
    // Google Turbo — perceptually smooth rainbow
    const data = [
      [0.18995,0.07176,0.23217],[0.19483,0.08339,0.26149],[0.19956,0.09498,0.29024],
      [0.20415,0.10652,0.31844],[0.20860,0.11802,0.34607],[0.21291,0.12947,0.37314],

      [0.26280,0.30639,0.72968],[0.26473,0.31706,0.74718],[0.26652,0.32768,0.76412],
      [0.26816,0.33825,0.78050],[0.26967,0.34878,0.79631],[0.27103,0.35926,0.81156],
      [0.27226,0.36970,0.82624],[0.27334,0.38008,0.84037],[0.27429,0.39043,0.85393],
      [0.27509,0.40072,0.86692],[0.27576,0.41097,0.87936],[0.27628,0.42118,0.89123],

      [0.27603,0.49132,0.95857],[0.27543,0.50115,0.96594],[0.27469,0.51094,0.97275],
      [0.27381,0.52069,0.97900],[0.27273,0.53040,0.98461],[0.27126,0.54015,0.98930],
      [0.26878,0.54995,0.99303],[0.26492,0.55979,0.99583],[0.25953,0.56967,0.99773],
      [0.25261,0.57958,0.99877],[0.24429,0.58952,0.99899],[0.23476,0.59948,0.99842],
      [0.22421,0.60946,0.99709],[0.21287,0.61944,0.99503],[0.20093,0.62943,0.99226],
      [0.18860,0.63941,0.98880],[0.17608,0.64938,0.98467],[0.16355,0.65933,0.97989],
      [0.15121,0.66926,0.97446],[0.13925,0.67916,0.96841],[0.12784,0.68903,0.96174],
      [0.11716,0.69887,0.95447],[0.10736,0.70868,0.94659],[0.09859,0.71846,0.93813],
      [0.09097,0.72821,0.92909],[0.08460,0.73794,0.91946],[0.07956,0.74764,0.90925],

      [0.23924,0.92414,0.59075],[0.26064,0.93274,0.56553],[0.28352,0.94123,0.53916],
      [0.30790,0.94962,0.51162],[0.33379,0.95790,0.48292],[0.36119,0.96606,0.45307],

      [0.48586,0.99751,0.32335],[0.52076,1.00505,0.28872],[0.55712,1.01245,0.25339],
      [0.59491,1.01971,0.21746],[0.63409,1.02682,0.18103],[0.67463,1.03379,0.14421],
      [0.71648,1.04060,0.10711],[0.75957,1.04726,0.06986],[0.80384,1.05376,0.03259],
      [0.84923,1.06010,-0.00459],[0.89566,1.06627,-0.04155],[0.94304,1.07227,-0.07819],
      [0.99130,1.07809,-0.11441]
    ];
    const idx = t * (data.length - 1);
    const i0 = Math.min(Math.floor(idx), data.length - 2);
    const i1 = i0 + 1;
    const frac = idx - i0;
    const a = data[i0], b = data[i1];
    return {
      r: Math.max(0, Math.min(1, a[0] + (b[0] - a[0]) * frac)),
      g: Math.max(0, Math.min(1, a[1] + (b[1] - a[1]) * frac)),
      b: Math.max(0, Math.min(1, a[2] + (b[2] - a[2]) * frac)),
    };
  },

  hot(t) {
    return {
      r: Math.min(1, t * 3),
      g: Math.max(0, Math.min(1, t * 3 - 1)),
      b: Math.max(0, Math.min(1, t * 3 - 2)),
    };
  },

  viridis(t) {
    const data = [

    const idx = t * (data.length - 1);
    const i0 = Math.min(Math.floor(idx), data.length - 2);
    const i1 = i0 + 1;
    const frac = idx - i0;
    const a = data[i0], b = data[i1];
    return {
      r: a[0] + (b[0] - a[0]) * frac,
      g: a[1] + (b[1] - a[1]) * frac,
      b: a[2] + (b[2] - a[2]) * frac,
    };
  },
};

// ══════════════════════════════════════
//  Normalization helpers
// ══════════════════════════════════════
function normalizeHeight(val) {
  // Returns value in [0, 1]
  const { dataMin, dataMax } = state;
  if (!dom.autoNormalize.checked) {
    // Use full theoretical range based on bit depth
    const range = state.bitsPerSample <= 8 ? 255 : 65535;
    return Math.max(0, Math.min(1, val / range));
  }
  if (dataMax <= dataMin) return 0.5;
  let norm = (val - dataMin) / (dataMax - dataMin);
  if (dom.invertHeight.checked) norm = 1 - norm;
  return Math.max(0, Math.min(1, norm));
}

function normToDisplay8(norm) {
  return Math.round(norm * 255);
}

// ══════════════════════════════════════
//  TIFF Loading
// ══════════════════════════════════════
async function loadTIFF(arrayBuffer, fileName) {
  // Check geotiff library
  if (typeof GeoTIFF === 'undefined') {
    showToast('❌ geotiff.js 库未加载，请检查网络连接后刷新页面');
    return;
  }

  // Show loading
  dom.empty2d.innerHTML = '<div class="spinner" style="display:block"></div><p style="font-size:12px;margin-top:8px;color:var(--text-secondary)">解析 TIFF...</p>';
  dom.empty3d.innerHTML = '<div class="spinner" style="display:block"></div><p style="font-size:12px;margin-top:8px;color:var(--text-secondary)">准备 3D 渲染...</p>';

  try {
    const t0 = performance.now();

    const tiff = await GeoTIFF.fromArrayBuffer(arrayBuffer);
    const image = await tiff.getImage();
    const width = image.getWidth();
    const height = image.getHeight();
    const samplesPerPixel = image.getSamplesPerPixel();
    const bitsPerSample = image.getBitsPerSample?.()?.[0] || 8;

    // Warn on very large images
    const totalPixels = width * height;
    if (totalPixels > 100_000_000) {
      showToast('⚠️ 图像非常大 (' + (width+'×'+height) + ')，可能需要较长时间处理');
    }

    // Read all rasters
    const rasters = await image.readRasters();
    const isRGB = samplesPerPixel >= 3;

    // Extract height data
    let heightDataFull;
    if (isRGB) {
      // Convert RGB to luminance for height
      const r = rasters[0];
      const g = rasters[1];
      const b = rasters[2];
      heightDataFull = new Float32Array(totalPixels);
      for (let i = 0; i < totalPixels; i++) {
        heightDataFull[i] = 0.299 * r[i] + 0.587 * g[i] + 0.114 * b[i];
      }
    } else {
      // Grayscale — use as-is
      const band = rasters[0];
      if (band instanceof Float32Array) {
        heightDataFull = new Float32Array(band);
      } else {
        heightDataFull = new Float32Array(totalPixels);
        for (let i = 0; i < totalPixels; i++) heightDataFull[i] = band[i];
      }
    }

    // Compute min/max
    let dataMin = Infinity, dataMax = -Infinity;
    for (let i = 0; i < totalPixels; i++) {
      const v = heightDataFull[i];
      if (v < dataMin) dataMin = v;
      if (v > dataMax) dataMax = v;
    }
    if (!isFinite(dataMin)) dataMin = 0;
    if (!isFinite(dataMax)) dataMax = 255;

    // Store state
    state.tiffLoaded = true;
    state.fileName = fileName;
    state.imgWidth = width;
    state.imgHeight = height;
    state.samplesPerPixel = samplesPerPixel;
    state.bitsPerSample = bitsPerSample;
    state.isRGB = isRGB;
    state.heightDataFull = heightDataFull;
    state.dataMin = dataMin;
    state.dataMax = dataMax;

    // Update UI
    const sizeStr = width + '×' + height;
    const bitStr = bitsPerSample + '-bit';
    const typeStr = isRGB ? 'RGB' : 'Gray';
    dom.fileInfo.textContent = `${fileName}  [${sizeStr}]  ${bitStr} ${typeStr}  Min:${dataMin.toFixed(1)}  Max:${dataMax.toFixed(1)}`;
    dom.statsBadge.style.display = 'block';
    dom.statMin.textContent = dataMin.toFixed(1);
    dom.statMax.textContent = dataMax.toFixed(1);
    dom.statRange.textContent = (dataMax - dataMin).toFixed(1);
    setUIEnabled(true);

    // Build default mesh resolution
    const defaultRes = Math.min(200, Math.max(50, Math.round(Math.max(width, height) / 5)));
    dom.meshRes.value = defaultRes;
    dom.meshResVal.textContent = defaultRes;

    // Render 2D
    render2D();

    // Initialize or update 3D
    if (!state.scene) {
      init3DScene();
    }
    buildMesh();
    resetCamera();

    const elapsed = (performance.now() - t0).toFixed(0);
    showToast(`✅ 已加载 ${fileName} (${sizeStr}, ${bitStr}) — ${elapsed}ms`);
  } catch (err) {
    console.error('TIFF load error:', err);
    showToast('❌ 加载 TIFF 失败: ' + err.message);
    dom.empty2d.innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><p>加载失败</p><p class="hint">' + err.message + '</p></div>';
  }
}

// ══════════════════════════════════════
//  2D Rendering
// ══════════════════════════════════════
function render2D() {
  const { imgWidth, imgHeight, heightDataFull, isRGB } = state;
  if (!heightDataFull) return;

  // Remove old canvas
  if (state.canvas2d) state.canvas2d.remove();

  const canvas = document.createElement('canvas');
  canvas.width = imgWidth;
  canvas.height = imgHeight;
  canvas.style.maxWidth = '100%';
  canvas.style.maxHeight = '100%';
  canvas.style.objectFit = 'contain';
  canvas.style.borderRadius = '4px';
  state.canvas2d = canvas;
  state.ctx2d = canvas.getContext('2d');

  const ctx = state.ctx2d;
  const imageData = ctx.createImageData(imgWidth, imgHeight);
  const data = imageData.data;
  const totalPixels = imgWidth * imgHeight;

  for (let i = 0; i < totalPixels; i++) {
    const norm = normalizeHeight(heightDataFull[i]);
    const v = normToDisplay8(norm);
    data[i * 4] = v;
    data[i * 4 + 1] = v;
    data[i * 4 + 2] = v;
    data[i * 4 + 3] = 255;
  }
  ctx.putImageData(imageData, 0, 0);

  dom.panel2dContent.innerHTML = '';
  dom.panel2dContent.appendChild(canvas);
  dom.empty2d.style.display = 'none';
}

// ══════════════════════════════════════
//  3D Scene Initialization
// ══════════════════════════════════════
function init3DScene() {
  const container = dom.panel3dContent;

  // Scene
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a1d23);
  state.scene = scene;

  // Camera
  const aspect = container.clientWidth / Math.max(1, container.clientHeight);
  const camera = new THREE.PerspectiveCamera(45, aspect, 0.1, 100);
  camera.position.set(5, 6, 5);
  // camera.up defaults to (0,1,0) — Y is up, matching height displacement
  state.camera = camera;

  // Renderer
  const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Cap for performance
  renderer.setSize(container.clientWidth, container.clientHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;
  state.renderer = renderer;
  dom.empty3d.style.display = 'none';
  container.appendChild(renderer.domElement);

  // OrbitControls
  const controls = new OrbitControls(camera, renderer.domElement);
  controls.target.set(0, 0.4, 0);
  controls.enableDamping = true;
  controls.dampingFactor = 0.12;
  controls.minDistance = 1;
  controls.maxDistance = 30;
  controls.maxPolarAngle = Math.PI * 0.75;
  controls.mouseButtons = {
    LEFT: THREE.MOUSE.ROTATE,
    MIDDLE: THREE.MOUSE.PAN,
    RIGHT: THREE.MOUSE.PAN,
  };
  controls.update();
  state.controls = controls;

  // Lights
  const ambientLight = new THREE.AmbientLight(0x404060, 1.5);
  scene.add(ambientLight);

  const keyLight = new THREE.DirectionalLight(0xffffff, 3.5);
  keyLight.position.set(8, 10, 6);
  keyLight.castShadow = true;
  keyLight.shadow.mapSize.width = 1024;
  keyLight.shadow.mapSize.height = 1024;
  keyLight.shadow.camera.near = 0.5;
  keyLight.shadow.camera.far = 60;
  keyLight.shadow.camera.left = -15;
  keyLight.shadow.camera.right = 15;
  keyLight.shadow.camera.top = 15;
  keyLight.shadow.camera.bottom = -15;
  keyLight.shadow.bias = -0.0005;
  scene.add(keyLight);

  const fillLight = new THREE.DirectionalLight(0x8899cc, 1.2);
  fillLight.position.set(-4, 3, 2);
  scene.add(fillLight);

  const rimLight = new THREE.DirectionalLight(0xffccaa, 1.0);
  rimLight.position.set(0, 7, -3);
  scene.add(rimLight);

  // Reference grid
  const gridHelper = new THREE.PolarGridHelper(8, 32, 24, 64, 0x333842, 0x252830);
  scene.add(gridHelper);

  // Start render loop
  if (!state.animationId) {
    animate();
  }
}

function animate() {
  state.animationId = requestAnimationFrame(animate);
  if (state.controls) {
    state.controls.update();
  }
  // Always render for smooth OrbitControls damping & responsive feel
  if (state.renderer && state.scene && state.camera) {
    state.renderer.render(state.scene, state.camera);
  }
}

// ══════════════════════════════════════
//  Build / Update 3D Mesh
// ══════════════════════════════════════
function buildMesh() {
  const { imgWidth, imgHeight, heightDataFull, scene, mesh } = state;
  if (!heightDataFull || !scene) return;

  const meshResTarget = parseInt(dom.meshRes.value) || 200;
  const aspectRatio = imgWidth / imgHeight;

  // Compute mesh grid dimensions
  let meshCols, meshRows;
  if (aspectRatio >= 1) {
    meshCols = meshResTarget;
    meshRows = Math.max(4, Math.round(meshResTarget / aspectRatio));
  } else {
    meshRows = meshResTarget;
    meshCols = Math.max(4, Math.round(meshResTarget * aspectRatio));
  }

  // Clamp mesh columns/rows to not exceed image dimensions
  meshCols = Math.min(meshCols, imgWidth - 1);
  meshRows = Math.min(meshRows, imgHeight - 1);
  meshCols = Math.max(4, meshCols);
  meshRows = Math.max(4, meshRows);

  state.meshCols = meshCols;
  state.meshRows = meshRows;

  // Sample height data at mesh resolution
  const totalVertices = (meshCols + 1) * (meshRows + 1);
  const heights = new Float32Array(totalVertices);

  const xRatio = (imgWidth - 1) / meshCols;
  const yRatio = (imgHeight - 1) / meshRows;

  for (let row = 0; row <= meshRows; row++) {
    const srcY = Math.round(row * yRatio);
    const rowOffset = srcY * imgWidth;
    const dstRowOffset = row * (meshCols + 1);
    for (let col = 0; col <= meshCols; col++) {
      const srcX = Math.round(col * xRatio);
      heights[dstRowOffset + col] = heightDataFull[rowOffset + srcX];
    }
  }

  // Compute normalized heights for coloring
  const normHeights = new Float32Array(totalVertices);
  for (let i = 0; i < totalVertices; i++) {
    normHeights[i] = normalizeHeight(heights[i]);
  }

  // Plane dimensions — maintain aspect ratio
  const planeWidth = 8;
  const planeHeight = planeWidth / aspectRatio;

  // Create or update geometry
  const geometry = new THREE.PlaneGeometry(planeWidth, planeHeight, meshCols, meshRows);
  geometry.rotateX(-Math.PI / 2); // Lay flat on XZ plane, Y is up

  // Apply Z (height) displacement — after rotateX, Z corresponds to original Y
  // Actually after rotateX(-PI/2), the original Y axis points up (world Y).
  // PlaneGeometry creates in XY, we rotated so it's in XZ plane.
  // The vertices after rotation: x→x, y→z, so height displaces along Y world axis.
  // Let me just set the Y component of each vertex.
  const positions = geometry.attributes.position;
  const zScale = parseFloat(dom.zScale.value) || 1;

  for (let i = 0; i < totalVertices; i++) {
    // Get the original flat position
    const x = positions.getX(i);
    const y = positions.getY(i);
    const z = positions.getZ(i);
    // Displace along world Y (up)
    positions.setXYZ(i, x, normHeights[i] * zScale * 2, z);
  }

  geometry.computeVertexNormals();

  // Vertex colors
  const cmapName = dom.colorMap.value || 'jet';
  const cmap = colorMaps[cmapName] || colorMaps.jet;
  const colorsArr = new Float32Array(totalVertices * 3);
  for (let i = 0; i < totalVertices; i++) {
    const c = cmap(normHeights[i]);
    colorsArr[i * 3] = c.r;
    colorsArr[i * 3 + 1] = c.g;
    colorsArr[i * 3 + 2] = c.b;
  }
  geometry.setAttribute('color', new THREE.BufferAttribute(colorsArr, 3));

  // Remove old mesh
  if (mesh) {
    mesh.geometry.dispose();
    if (state.textureMap) {
      state.textureMap.dispose();
      state.textureMap = null;
    }
    scene.remove(mesh);
  }

  // Build texture from original image (for texture overlay mode)
  buildTexture();

  // Material
  const material = new THREE.MeshStandardMaterial({
    vertexColors: !dom.showTexture.checked,
    map: dom.showTexture.checked ? state.textureMap : null,
    roughness: 0.55,
    metalness: 0.05,
    flatShading: false,
    side: THREE.DoubleSide,
    wireframe: dom.wireframe.checked,
  });
  state.meshMaterial = material;

  // Mesh
  const newMesh = new THREE.Mesh(geometry, material);
  newMesh.castShadow = true;
  newMesh.receiveShadow = true;
  scene.add(newMesh);

  state.mesh = newMesh;
  state.meshGeometry = geometry;
  state.needsRender = true;
}

function buildTexture() {
  const { imgWidth, imgHeight, heightDataFull, isRGB } = state;
  if (!heightDataFull) return;

  // Limit texture resolution for GPU memory
  const MAX_TEX_DIM = 1024;
  let texW = imgWidth;
  let texH = imgHeight;
  if (Math.max(texW, texH) > MAX_TEX_DIM) {
    const scale = MAX_TEX_DIM / Math.max(texW, texH);
    texW = Math.round(texW * scale);
    texH = Math.round(texH * scale);
  }

  const canvas = document.createElement('canvas');
  canvas.width = texW;
  canvas.height = texH;
  const ctx = canvas.getContext('2d');
  const imageData = ctx.createImageData(texW, texH);
  const data = imageData.data;

  const xRatio = (imgWidth - 1) / (texW - 1);
  const yRatio = (imgHeight - 1) / (texH - 1);

  for (let y = 0; y < texH; y++) {
    const srcY = Math.round(y * yRatio);
    const srcRow = srcY * imgWidth;
    const dstRow = y * texW;
    for (let x = 0; x < texW; x++) {
      const srcX = Math.round(x * xRatio);
      const norm = normalizeHeight(heightDataFull[srcRow + srcX]);
      const v = normToDisplay8(norm);
      const dstIdx = (dstRow + x) * 4;
      data[dstIdx] = v;
      data[dstIdx + 1] = v;
      data[dstIdx + 2] = v;
      data[dstIdx + 3] = 255;
    }
  }
  ctx.putImageData(imageData, 0, 0);

  if (state.textureMap) state.textureMap.dispose();

  const texture = new THREE.CanvasTexture(canvas);
  texture.colorSpace = THREE.SRGBColorSpace;
  texture.minFilter = THREE.LinearMipmapLinearFilter;
  texture.magFilter = THREE.LinearFilter;
  texture.generateMipmaps = true;
  state.textureMap = texture;
  state.textureCanvas = canvas;
}

function updateMeshAppearance() {
  const { meshMaterial, textureMap } = state;
  if (!meshMaterial) return;

  meshMaterial.vertexColors = !dom.showTexture.checked;
  meshMaterial.map = dom.showTexture.checked ? textureMap : null;
  meshMaterial.wireframe = dom.wireframe.checked;
  meshMaterial.needsUpdate = true;
  state.needsRender = true;
}

function updateMeshHeights() {
  const { meshGeometry, meshCols, meshRows, heightDataFull, imgWidth, imgHeight } = state;
  if (!meshGeometry || !heightDataFull) return;

  const totalVertices = (meshCols + 1) * (meshRows + 1);
  const positions = meshGeometry.attributes.position;
  const zScale = parseFloat(dom.zScale.value) || 1;

  const xRatio = (imgWidth - 1) / meshCols;
  const yRatio = (imgHeight - 1) / meshRows;

  // Re-sample and update
  const normHeights = new Float32Array(totalVertices);
  for (let row = 0; row <= meshRows; row++) {
    const srcY = Math.round(row * yRatio);
    const rowOffset = srcY * imgWidth;
    const dstRowOffset = row * (meshCols + 1);
    for (let col = 0; col <= meshCols; col++) {
      const srcX = Math.round(col * xRatio);
      const val = heightDataFull[rowOffset + srcX];
      normHeights[dstRowOffset + col] = normalizeHeight(val);
    }
  }

  for (let i = 0; i < totalVertices; i++) {
    const x = positions.getX(i);
    const z = positions.getZ(i);
    positions.setXYZ(i, x, normHeights[i] * zScale * 2, z);
  }

  meshGeometry.computeVertexNormals();
  meshGeometry.attributes.position.needsUpdate = true;

  // Update vertex colors
  const cmapName = dom.colorMap.value || 'jet';
  const cmap = colorMaps[cmapName] || colorMaps.jet;
  const colorsAttr = meshGeometry.attributes.color;
  for (let i = 0; i < totalVertices; i++) {
    const c = cmap(normHeights[i]);
    colorsAttr.setXYZ(i, c.r, c.g, c.b);
  }
  colorsAttr.needsUpdate = true;

  state.needsRender = true;
}

// ══════════════════════════════════════
//  Camera helpers
// ══════════════════════════════════════
function resetCamera() {
  const { controls, camera } = state;
  if (!controls || !camera) return;
  camera.position.set(4, 5, 7);
  controls.target.set(0, 0.4, 0);
  controls.update();
  state.needsRender = true;
}

function topView() {
  const { controls, camera } = state;
  if (!controls || !camera) return;
  camera.position.set(0, 12, 0.01);
  controls.target.set(0, 0.4, 0);
  controls.update();
  state.needsRender = true;
}

// ══════════════════════════════════════
//  Screenshot
// ══════════════════════════════════════
function takeScreenshot() {
  const { renderer, scene, camera } = state;
  if (!renderer) return;
  renderer.render(scene, camera);
  const dataURL = renderer.domElement.toDataURL('image/png');
  const link = document.createElement('a');
  link.download = (state.fileName || 'heightmap').replace(/\.[^.]+$/, '') + '_3d.png';
  link.href = dataURL;
  link.click();
  showToast('📸 截图已保存');
}

// ══════════════════════════════════════
//  Full rebuild (resolution change, etc.)
// ══════════════════════════════════════
function fullRebuild() {
  if (!state.tiffLoaded) return;
  buildMesh();
}

// ══════════════════════════════════════
//  Event Handlers
// ══════════════════════════════════════

// File open button
dom.btnOpen.addEventListener('click', () => dom.fileInput.click());
dom.fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (file) handleFile(file);
});

// Drag and Drop
let dragCounter = 0;
document.addEventListener('dragenter', (e) => {
  e.preventDefault();
  dragCounter++;
  dom.dropOverlay.classList.add('active');
});
document.addEventListener('dragleave', (e) => {
  e.preventDefault();
  dragCounter--;
  if (dragCounter <= 0) {
    dragCounter = 0;
    dom.dropOverlay.classList.remove('active');
  }
});
document.addEventListener('dragover', (e) => {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'copy';
});
document.addEventListener('drop', (e) => {
  e.preventDefault();
  dragCounter = 0;
  dom.dropOverlay.classList.remove('active');
  const file = e.dataTransfer.files[0];
  if (file) handleFile(file);
});

function handleFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  if (ext !== 'tif' && ext !== 'tiff') {
    showToast('⚠️ 请选择 .tif 或 .tiff 文件');
    return;
  }
  file.arrayBuffer().then(buf => loadTIFF(buf, file.name));
}

// Control event handlers
dom.zScale.addEventListener('input', () => {
  dom.zScaleVal.textContent = parseFloat(dom.zScale.value).toFixed(2);
  updateMeshHeights();
});
dom.meshRes.addEventListener('input', () => {
  dom.meshResVal.textContent = dom.meshRes.value;
});
dom.meshRes.addEventListener('change', () => {
  fullRebuild();
});
dom.colorMap.addEventListener('change', () => {
  if (state.meshGeometry) {
    updateMeshHeights();
  }
  // Also re-render 2D if we want colorized 2D
  // For now, 2D stays grayscale
});
dom.invertHeight.addEventListener('change', () => {
  render2D();
  if (state.meshGeometry) {
    updateMeshHeights();
  }
  // Update stats
  if (state.tiffLoaded) {
    const { dataMin, dataMax } = state;
    dom.statMin.textContent = dataMin.toFixed(1);
    dom.statMax.textContent = dataMax.toFixed(1);
  }
});
dom.autoNormalize.addEventListener('change', () => {
  render2D();
  if (state.meshGeometry) {
    updateMeshHeights();
  }
});
dom.showTexture.addEventListener('change', () => {
  updateMeshAppearance();
});
dom.wireframe.addEventListener('change', () => {
  updateMeshAppearance();
});

// Buttons
dom.btnReset.addEventListener('click', resetCamera);
dom.btnTopView.addEventListener('click', topView);
dom.btnScreenshot.addEventListener('click', takeScreenshot);

// Resize handler
function onResize() {
  const container = dom.panel3dContent;
  if (!state.renderer || !state.camera) return;
  const w = container.clientWidth;
  const h = container.clientHeight;
  if (w <= 0 || h <= 0) return;
  state.camera.aspect = w / h;
  state.camera.updateProjectionMatrix();
  state.renderer.setSize(w, h);
  state.needsRender = true;
}
window.addEventListener('resize', onResize);

// Keyboard shortcuts
window.addEventListener('keydown', (e) => {
  if (!state.tiffLoaded) return;
  switch (e.key.toLowerCase()) {
    case 'r':
      resetCamera();
      break;
    case 't':
      topView();
      break;
    case 'f':
      // Toggle full rebuild with current settings
      fullRebuild();
      break;
    case 'w':
      dom.wireframe.checked = !dom.wireframe.checked;
      updateMeshAppearance();
      break;
    case 'i':
      dom.invertHeight.checked = !dom.invertHeight.checked;
      dom.invertHeight.dispatchEvent(new Event('change'));
      break;
    case 'g':
      dom.showTexture.checked = !dom.showTexture.checked;
      updateMeshAppearance();
      break;
  }
});

// Initialize empty state
console.log('🏔️ TIFF 3D Height Map Viewer ready');
console.log('  - 拖放 TIFF 文件开始');
console.log('  - 支持 8-bit / 16-bit 灰度 & RGB TIFF');
console.log('  - 快捷键: R=重置视角 T=俯视 W=线框 I=反转 G=纹理');
</script>
</body>
</html>
